<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse · Live Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* =============================================
               CSS VARIABLES / DESIGN TOKENS
               ============================================= */
        :root {
            /* Primary Colors */
            --color-primary: #6366F1;
            --color-primary-light: #818CF8;
            --color-primary-dark: #4F46E5;
            --color-primary-bg: #EEF2FF;
            
            /* Neutral Colors */
            --color-bg: #F8FAFC;
            --color-card: #FFFFFF;
            --color-border: #E2E8F0;
            --color-border-hover: #CBD5E1;
            --color-text-primary: #0F172A;
            --color-text-secondary: #475569;
            --color-text-muted: #94A3B8;
            
            /* Semantic Colors */
            --color-success: #22C55E;
            --color-warning: #F59E0B;
            --color-info: #3B82F6;
            --color-danger: #EF4444;
            --color-purple: #8B5CF6;
            
            /* Application Colors */
            --color-jira: #0052CC;
            --color-github: #24292F;
            --color-slack: #4A154B;
            --color-aws: #FF9900;
            
            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-h1: 24px;
            --font-size-h2: 20px;
            --font-size-h3: 18px;
            --font-size-base: 14px;
            --font-size-small: 13px;
            --font-size-tiny: 11px;
            
            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            /* Transitions */
            --transition-fast: 150ms ease;
            --transition-base: 250ms ease;
            --transition-slow: 350ms ease;

            /* Layout Heights */
            --header-height: 70px;
        }
        
        /* =============================================
               RESET & BASE STYLES
               ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-top: var(--header-height);
        }
        
        /* =============================================
               LAYOUT: GLOBAL TOP HEADER
               ============================================= */
        .global-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--color-card);
            border-bottom: 1px solid var(--color-border);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-xl);
            box-shadow: var(--shadow-sm);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        /* Branding Architecture */
        .brand {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            text-decoration: none;
        }
        
        .brand .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--color-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 700;
        }
        
        .brand h1 {
            font-size: var(--font-size-h2);
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        .brand h1 span {
            color: var(--color-primary);
        }

        /* Context Title Link Separator */
        .context-divider {
            color: var(--color-text-muted);
            font-size: var(--font-size-h2);
            font-weight: 400;
            user-select: none;
        }

        .context-title {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--color-primary);
            background: var(--color-primary-bg);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .context-title:hover {
            background: var(--color-primary);
            color: white;
        }

        /* Header Right Side Utilities */
        .header-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 6px 14px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            font-size: var(--font-size-small);
            font-weight: 500;
        }
        
        .connection-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .connection-status .dot.online { background: var(--color-success); }
        .connection-status .dot.offline { background: var(--color-danger); }
        .connection-status .dot.connecting { background: var(--color-warning); }
        
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-card);
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }
        
        .icon-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        
        .icon-btn .notification-dot {
            position: absolute;
            top: -1px;
            right: -1px;
            width: 9px;
            height: 9px;
            background: var(--color-danger);
            border-radius: 50%;
            border: 2px solid var(--color-card);
        }

        /* User Profile Block */
        .user-profile-trigger {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding-left: var(--spacing-md);
            border-left: 1px solid var(--color-border);
        }

        .user-profile-trigger .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: var(--font-size-small);
        }

        .user-profile-trigger .user-meta {
            display: flex;
            flex-direction: column;
        }

        .user-profile-trigger .user-meta .name {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .user-profile-trigger .user-meta .role {
            font-size: var(--font-size-tiny);
            color: var(--color-text-muted);
        }
        
        /* =============================================
               MAIN CONTENT AREA
               ============================================= */
        .main-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        /* Page Content Header Block */
        .feed-intro {
            margin-bottom: var(--spacing-lg);
        }

        .feed-intro h2 {
            font-size: var(--font-size-h1);
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .feed-intro p {
            color: var(--color-text-secondary);
            font-size: var(--font-size-base);
            margin-top: var(--spacing-xs);
        }
        
        /* =============================================
               SEARCH STATUS BAR
               ============================================= */
        #search-status {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-primary-bg);
            border-radius: var(--radius-sm);
            color: var(--color-primary);
            font-size: var(--font-size-small);
            font-weight: 500;
            margin-bottom: var(--spacing-md);
            display: none;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        #search-status.show {
            display: flex;
        }
        
        /* =============================================
               FEED METRICS ROW
               ============================================= */
        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }
        
        #counter {
            font-size: var(--font-size-small);
            font-weight: 500;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        #counter .count-number {
            font-weight: 700;
            color: var(--color-text-primary);
            font-size: var(--font-size-base);
        }
        
        #counter .last-update {
            color: var(--color-text-muted);
            font-weight: 400;
        }
        
        /* =============================================
               EVENT FEED LOGS & LISTS
               ============================================= */
        #feed {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .date-group {
            margin-top: var(--spacing-lg);
        }
        
        .date-group:first-child {
            margin-top: 0;
        }
        
        .date-group .date-label {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: var(--spacing-sm) 0;
            border-bottom: 2px solid var(--color-border);
            margin-bottom: var(--spacing-md);
        }
        
        .event-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            transition: all var(--transition-base);
            position: relative;
            display: flex;
            gap: var(--spacing-md);
            align-items: flex-start;
            cursor: default;
        }
        
        .event-card:hover {
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .event-card .severity-line {
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            border-radius: 0 4px 4px 0;
        }
        
        .event-card .severity-line.INFO { background: var(--color-info); }
        .event-card .severity-line.WARNING { background: var(--color-warning); }
        .event-card .severity-line.CRITICAL { background: var(--color-danger); }
        .event-card .severity-line.SUCCESS { background: var(--color-success); }
        
        .event-card .event-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }
        
        .event-card .event-avatar.github { background: #24292F; color: white; }
        .event-card .event-avatar.jira { background: #0052CC; color: white; }
        .event-card .event-avatar.slack { background: #4A154B; color: white; }
        .event-card .event-avatar.aws { background: #FF9900; color: #232F3E; }
        .event-card .event-avatar.default { background: var(--color-primary-bg); color: var(--color-primary); }
        
        .event-content {
            flex: 1;
            min-width: 0;
        }
        
        .event-card .event-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-xs);
        }
        
        .event-card .event-type {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--color-text-secondary);
        }
        
        .event-card .event-type i {
            margin-right: var(--spacing-xs);
        }
        
        .event-card .event-issue {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--color-text-primary);
        }
        
        .event-card .event-issue a {
            color: var(--color-primary);
            text-decoration: none;
        }
        
        .event-card .event-issue a:hover {
            text-decoration: underline;
        }
        
        .event-card .event-message {
            font-size: var(--font-size-base);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xs);
            word-wrap: break-word;
        }
        
        .event-card .event-meta {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            font-size: var(--font-size-small);
            color: var(--color-text-muted);
        }
        
        .event-card .event-meta .user {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .event-card .event-meta .user .avatar-small {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-primary-bg);
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
        }
        
        .event-card .event-meta .badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: var(--font-size-tiny);
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .event-card .event-meta .badge.created { background: #DCFCE7; color: #16A34A; }
        .event-card .event-meta .badge.updated { background: #FEF3C7; color: #D97706; }
        .event-card .event-meta .badge.commented { background: #DBEAFE; color: #2563EB; }
        .event-card .event-meta .badge.deleted { background: #FEE2E2; color: #DC2626; }
        
        .event-card .event-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-left: auto;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        
        .event-card:hover .event-actions {
            opacity: 1;
        }
        
        .event-card .event-actions button {
            padding: 4px 8px;
            border: none;
            background: none;
            color: var(--color-text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            font-size: var(--font-size-small);
        }
        
        .event-card .event-actions button:hover {
            background: var(--color-primary-bg);
            color: var(--color-primary);
        }
        
        /* App Badge Labels */
        .source-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: var(--font-size-tiny);
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .source-tag.github { background: #F6F8FA; color: #24292F; }
        .source-tag.jira { background: #E6F0FF; color: #0052CC; }
        .source-tag.slack { background: #F5EEF9; color: #4A154B; }
        .source-tag.aws { background: #FFF3E6; color: #FF9900; }
        .source-tag.default { background: var(--color-primary-bg); color: var(--color-primary); }
        
        /* =============================================
               EMPTY LAYOUT AND LOADING STATES
               ============================================= */
        .empty-state {
            text-align: center;
            padding: var(--spacing-2xl) var(--spacing-lg);
            background: var(--color-card);
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-lg);
        }
        
        .empty-state .empty-icon {
            font-size: 48px;
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-md);
        }
        
        .empty-state h3 {
            font-size: var(--font-size-h3);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-sm);
        }
        
        .empty-state p {
            color: var(--color-text-secondary);
            font-size: var(--font-size-base);
        }
        
        .loading-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-muted);
        }
        
        .loading-state .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--color-border);
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: var(--spacing-md);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* =============================================
               RESPONSIVE BREAKPOINTS
               ============================================= */
        @media (max-width: 1024px) {
            .global-header { padding: 0 var(--spacing-md); }
            .user-profile-trigger .user-meta { display: none; }
        }
        
        @media (max-width: 768px) {
            .global-header { height: auto; padding: var(--spacing-sm) var(--spacing-md); flex-direction: column; gap: var(--spacing-sm); }
            body { padding-top: 120px; }
            .header-left { width: 100%; justify-content: flex-start; }
            .header-right { width: 100%; justify-content: space-between; }
            .main-content { padding: var(--spacing-md); }
            .event-card { flex-direction: column; }
            .event-card .event-actions { opacity: 1; margin-left: 0; margin-top: var(--spacing-sm); width: 100%; justify-content: flex-start; }
            .event-card .event-header { flex-direction: column; align-items: flex-start; }
            #counter .last-update { display: none; }
        }
        
        /* =============================================
               TOAST NOTIFICATIONS
               ============================================= */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            max-width: 360px;
        }
        
        .toast {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-sm);
            animation: slideIn 0.3s ease;
        }
        
        .toast .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .toast .toast-content {
            flex: 1;
        }
        
        .toast .toast-title {
            font-weight: 600;
            font-size: var(--font-size-small);
        }
        
        .toast .toast-message {
            font-size: var(--font-size-small);
            color: var(--color-text-secondary);
        }
        
        .toast .toast-close {
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            padding: 4px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* =============================================
               WORKSPACE ENCLOSURE DESIGN
          ============================================= */
        .feed-workspace-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            margin-top: var(--spacing-md);
        }

        /* =============================================
               UX ENHANCED PAGINATION DESIGN
           ============================================= */
        .pagination-container {
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }
        
        .pagination-container .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 8px 16px;
            background: var(--color-card);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            font-size: var(--font-size-small);
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: all 200ms ease;
        }
        
        .pagination-container .btn:not(:disabled):hover {
            background: var(--color-primary-bg);
            border-color: var(--color-primary-light);
            color: var(--color-primary);
            transform: translateY(-1px);
        }
        
        .pagination-container .btn:disabled {
            background: var(--color-bg);
            color: var(--color-text-muted);
            border-color: var(--color-border);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .pagination-container #pageIndicator {
            font-size: var(--font-size-small);
            font-weight: 500;
            color: var(--color-text-secondary);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            padding: 6px 16px;
            border-radius: 20px;
        }
        
        .pagination-container #currentPageNum {
            font-weight: 700;
            color: var(--color-primary);
        }

        /* =============================================
                PROFESSIONAL ACTION BUTTON DESIGN
        ============================================= */
        .btn-advanced-search {
            background: var(--color-primary-bg);
            color: var(--color-primary-dark);
            border: 1px solid rgba(99, 102, 241, 0.25);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-family: var(--font-family);
            font-size: var(--font-size-small);
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            transition: all var(--transition-fast);
            outline: none;
        }

        .btn-advanced-search i {
            font-size: 12px;
            color: var(--color-primary);
            transition: transform var(--transition-fast);
        }

        /* Hover State: Smooth background deepening and elevation */
        .btn-advanced-search:hover {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .btn-advanced-search:hover i {
            color: white;
            transform: rotate(90deg); /* Playful micro-interaction on the sliders icon */
        }

        /* Active State: Click indentation */
        .btn-advanced-search:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.1);
        }

        /* Focus State: Accessible keyboard navigation indicator */
        .btn-advanced-search:focus-visible {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <header class="global-header">
        <div class="header-left">
            <a href="/dashboard/" class="brand">
                <div class="logo-icon">D</div>
                <h1>Dev<span>Pulse</span></h1>
            </a>
            <span class="context-divider">·</span>
            <a href="/dashboard/search.html" class="context-title" title="Open Advanced Search Panel">
                <i class="fas fa-search"></i> Advanced Search
            </a>
        </div>

        <div class="header-right">
            <div class="header-actions">
                <span class="connection-status" id="status">
                    <span class="dot connecting" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </span>
                
                <button class="icon-btn" onclick="showToast('info', 'New updates', 'You have 5 new events')">
                    <i class="fas fa-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                
                <button class="icon-btn" onclick="window.location.href='/dashboard/search.html'" title="Advanced Search" style="background: var(--color-primary-bg); color: var(--color-primary); border-color: var(--color-primary-light);">
                    <i class="fas fa-search"></i>
                </button>

                <button class="icon-btn" onclick="loadHistory()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>

            <div class="user-profile-trigger">
                <div class="avatar">LS</div>
                <div class="user-meta">
                    <span class="name">Lucky Shukla</span>
                    <span class="role">Developer</span>
                </div>
            </div>
        </div>
    </header>
        
    <main class="main-content">
        <section class="feed-intro">
            <h2>⚡ Live Feed</h2>
            <p>Real-time activity log aggregated across all active enterprise applications</p>
        </section>
        
        <div id="search-status"></div>
        
        <div class="feed-header">
            <div id="counter">
                <span class="count-number" id="countNumber">0</span>
                <span>events loaded</span>
                <span class="last-update">· Last update: <span id="lastUpdate">—</span></span>
            </div>
            <div style="display:flex; gap:var(--spacing-sm);">
                <button class="btn-advanced-search" onclick="window.location.href='/dashboard/search.html'" title="Open Advanced Filters Configuration">
                    <i class="fas fa-sliders-h"></i>  Search
                </button>
            </div>
        </div>
        
        <div class="feed-workspace-card">
            <div id="feed">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading history...</p>
                </div>
            </div>
        </div>
    </main>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script>
        const API_BASE = window.location.origin;
        const WS_PROTOCOL = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const WS_URL = WS_PROTOCOL + window.location.host + '/ws/live/feed/';
        
        const feed = document.getElementById('feed');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const countNumber = document.getElementById('countNumber');
        const lastUpdateEl = document.getElementById('lastUpdate');
        
        let eventCount = 0;
        let ws = null;
                
        function getInitials(name) {
            if (!name) return 'U';
            const parts = name.split(' ');
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return name.substring(0, 2).toUpperCase();
        }
        
        function getAppIcon(integration) {
            const lower = (integration || '').toLowerCase();
            if (lower.includes('jira')) return 'fab fa-jira';
            if (lower.includes('github')) return 'fab fa-github';
            if (lower.includes('slack')) return 'fab fa-slack';
            if (lower.includes('aws')) return 'fas fa-cloud';
            return 'fas fa-cube';
        }
        
        function getAppClass(integration) {
            const lower = (integration || '').toLowerCase();
            if (lower.includes('jira')) return 'jira';
            if (lower.includes('github')) return 'github';
            if (lower.includes('slack')) return 'slack';
            if (lower.includes('aws')) return 'aws';
            return 'default';
        }
        
        function getBadgeClass(eventType) {
            const lower = (eventType || '').toLowerCase();
            if (lower.includes('created')) return 'created';
            if (lower.includes('updated')) return 'updated';
            if (lower.includes('comment')) return 'commented';
            if (lower.includes('deleted')) return 'deleted';
            return 'updated';
        }
        
        function getEventIcon(eventType) {
            const lower = (eventType || '').toLowerCase();
            if (lower.includes('created')) return 'fa-plus-circle';
            if (lower.includes('updated')) return 'fa-pen';
            if (lower.includes('comment')) return 'fa-comment';
            if (lower.includes('deleted')) return 'fa-trash';
            return 'fa-circle';
        }
        
        function extractUser(message) {
            if (!message) return null;
            const match = message.match(/^([A-Z][a-z]+(?:\s[A-Z][a-z]+)*)/);
            return match ? match[0] : null;
        }
        
        function extractIssue(message) {
            if (!message) return null;
            const match = message.match(/([A-Z]+-\d+)/);
            return match ? match[0] : null;
        }
        
        function createEventCard(data) {
            const appClass = getAppClass(data.integration);
            const initials = getInitials('Lucky Shukla');
            const user = extractUser(data.message) || 'Unknown';
            const issue = extractIssue(data.message);
            const badgeClass = getBadgeClass(data.event_type);
            const eventIcon = getEventIcon(data.event_type);
            const severity = data.severity || 'INFO';
            
            const timestamp = new Date(data.timestamp);
            const timeStr = timestamp.toLocaleString('en-US', {
                month: '2-digit', day: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            
            const card = document.createElement('div');
            card.className = 'event-card';
            
            card.innerHTML = `
                <div class="severity-line ${severity}"></div>
                <div class="event-avatar ${appClass}">${initials}</div>
                <div class="event-content">
                    <div class="event-header">
                        <span class="event-type"><i class="fas ${eventIcon}"></i> ${data.event_type}</span>
                        ${issue ? `<span class="event-issue"><a href="#">${issue}</a></span>` : ''}
                        <span class="source-tag ${appClass}"><i class="${getAppIcon(data.integration)}"></i> ${data.integration || 'Unknown'}</span>
                        <span class="badge ${badgeClass}">${data.event_type.split('_').pop()}</span>
                    </div>
                    <div class="event-message">${data.message}</div>
                    <div class="event-meta">
                        <span class="user"><span class="avatar-small">${getInitials(user)}</span>${user}</span>
                        <span>·</span>
                        <span><i class="far fa-clock"></i> ${timeStr}</span>
                        ${data.repo_name ? `<span>· <i class="fas fa-folder"></i> ${data.repo_name}</span>` : ''}
                    </div>
                </div>
            `;
            return card;
        }
        
        function groupEventsByDate(events) {
            const groups = {};
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
            
            events.forEach(event => {
                const date = new Date(event.timestamp); date.setHours(0, 0, 0, 0);
                let key = date.getTime() === today.getTime() ? 'Today' : date.getTime() === yesterday.getTime() ? 'Yesterday' : date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                if (!groups[key]) groups[key] = [];
                groups[key].push(event);
            });
            return groups;
        }
        
        function displayEvents(events) {
            feed.innerHTML = '';
            eventCount = events.length;
            
            if (events.length === 0) {
                feed.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                        <h3>No events found</h3>
                        <p>Check back later for new activity log indexes.</p>
                    </div>
                `;
                countNumber.textContent = '0';
                return;
            }
            
            const groups = groupEventsByDate(events);
            const orderedKeys = ['Today', 'Yesterday', ...Object.keys(groups).filter(k => k !== 'Today' && k !== 'Yesterday')];
            
            orderedKeys.forEach(key => {
                if (!groups[key]) return;
                const groupDiv = document.createElement('div');
                groupDiv.className = 'date-group';
                groupDiv.innerHTML = `<div class="date-label"><i class="far fa-calendar-alt"></i> ${key}</div>`;
                groups[key].forEach(event => groupDiv.appendChild(createEventCard(event)));
                feed.appendChild(groupDiv);
            });
            
            countNumber.textContent = events.length;
            lastUpdateEl.textContent = new Date().toLocaleTimeString();
        }
        
        function updateCounter() {
            countNumber.textContent = eventCount;
            lastUpdateEl.textContent = new Date().toLocaleTimeString();
        }
        
        function loadHistory() {
            feed.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading history...</p></div>`;
            fetch(API_BASE + '/api/v1/dashboard/history/')
                .then(res => res.json())
                .then(result => {
                    if (result.data && result.data.length > 0) displayEvents(result.data);
                    else feed.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-clock"></i></div><h3>No events yet</h3><p>Waiting for live activity...</p></div>`;
                })
                .catch(err => {
                    feed.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Could not load history</h3><p>Ensure backend operations server is online.</p></div>`;
                });
        }
        
        function markAllRead() { showToast('success', 'All Read', 'All dashboard event indicators updated.'); }
        
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            const colors = { success: 'var(--color-success)', error: 'var(--color-danger)', warning: 'var(--color-warning)', info: 'var(--color-info)' };
            
            toast.innerHTML = `
                <div class="toast-icon" style="color: ${colors[type]}"><i class="fas ${icons[type]}"></i></div>
                <div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>
                <button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentElement) { toast.remove(); } }, 4000);
        }
        
        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                ws.onopen = () => { statusText.textContent = 'Connected'; statusDot.className = 'dot online'; };
                ws.onclose = () => { statusText.textContent = 'Disconnected'; statusDot.className = 'dot offline'; setTimeout(connectWebSocket, 3000); };
                ws.onerror = () => { statusText.textContent = 'Connection Error'; statusDot.className = 'dot offline'; };
                ws.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        let todayGroup = feed.querySelector('.date-group:first-child');
                        if (!todayGroup) {
                            todayGroup = document.createElement('div'); todayGroup.className = 'date-group';
                            todayGroup.innerHTML = '<div class="date-label"><i class="far fa-calendar-alt"></i> Today</div>';
                            feed.insertBefore(todayGroup, feed.firstChild);
                        }
                        todayGroup.insertBefore(createEventCard(data), todayGroup.children[1] || null);
                        eventCount++; updateCounter();
                    } catch(err) { console.error(err); }
                };
            } catch (err) { console.error(err); }
        }

        loadHistory();
        setTimeout(connectWebSocket, 500);
    </script>
</body>
</html>
